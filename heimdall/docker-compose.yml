version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: heimdall
      POSTGRES_PASSWORD: heimdall
      POSTGRES_DB: heimdall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdall"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://heimdall:heimdall@db:5432/heimdall
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIVETRAN_API_KEY: ${FIVETRAN_API_KEY:-}
      FIVETRAN_API_SECRET: ${FIVETRAN_API_SECRET:-}
      RUST_LOG: info
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://heimdall:heimdall@db:5432/heimdall
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIVETRAN_API_KEY: ${FIVETRAN_API_KEY:-}
      FIVETRAN_API_SECRET: ${FIVETRAN_API_SECRET:-}
      RUST_LOG: info
      CRAWL_INTERVAL_SECS: "120"
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
